<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rostek | Freelancer IT</title>
    <style>
        :root { --neon: #00f2ff; --bg: #0b0e14; --card: #161b22; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 0; }
        .container { max-width: 900px; margin: auto; padding: 40px 20px; }
        
        /* Hero Section */
        header { text-align: center; padding: 60px 0; }
        h1 { font-size: 3em; margin: 0; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        .subtitle { font-size: 1.2em; color: #8b949e; margin-bottom: 30px; }

        /* Buttons */
        .cta-group { display: flex; justify-content: center; gap: 20px; }
        .btn { padding: 15px 30px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.3s; border: 1px solid var(--neon); color: var(--neon); }
        .btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }

        /* Tech Section */
        .tech-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 30px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #30363d; }
        .card h3 { color: var(--neon); margin-top: 0; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>ROSTEK</h1>
        <p class="subtitle">Freelancer IT | E-commerce, Flutter & Automatyzacja</p>
        <div class="cta-group">
            <a href="TWÓJ_LINK_DO_FIVERR" class="btn">FIVERR</a>
            <a href="TWÓJ_LINK_DO_USEME" class="btn">USEME</a>
        </div>
    </header>

    <section>
        <h2>Moje Umiejętności</h2>
        <div class="tech-grid">
            <div class="card"><h3>Mobile</h3><p>Flutter / Dart</p></div>
            <div class="card"><h3>Web</h3><p>Shopify / Woo</p></div>
            <div class="card"><h3>Backend</h3><p>Python / Docker</p></div>
            <div class="card"><h3>Tools</h3><p>Linux / Git</p></div>
        </div>
    </section>
</div>

</body>
</html>
